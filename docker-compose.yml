version: '3.8'

services:
  grader:
    build: .
    # init: tini làm PID 1, nhận & chuyển SIGTERM xuống uvicorn/worker khi Ctrl+C
    # → container dừng nhanh & sạch, không bị kill cứng (exit 137) sau 10s chờ.
    init: true
    ports:
      - "8000:8000"
    env_file:
      - .env
    
    # Cache model NGAY TRONG PROJECT (bind mount ./.model_cache → /root/.cache):
    # Gom cả HuggingFace lẫn torch hub để không tải lại bất cứ phần nào qua mỗi lần chạy.
    # Thư mục ./.model_cache cần được thêm vào .gitignore.
    volumes:
      - whisper-cache:/root/.cache
      # Voice Piper cho /tts (nghe phát âm đúng). Đặt file .onnx (+ .onnx.json cùng tên)
      # vào ./voices trên host rồi trỏ TTS_VOICE_US/GB tới chúng. Thiếu → /tts 503.
      - ./voices:/app/voices:ro
      # Lịch sử chấm bài (SQLite WAL + audio) — persist qua rebuild. Mount subtree
      # riêng, KHÔNG mount cả ./data (sẽ che data/questions, data/image đã COPY
      # trong image). 2 path TOEIC_HISTORY_* ở environment trỏ vào đây.
      - ./data/history:/app/data/history

    # Cho phép container gọi service trên host (llama.cpp) qua host.docker.internal.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    
    # ── ĐỒNG BỘ MÔI TRƯỜNG & TOKEN TẢI TỐC ĐỘ CAO ─────────────────────────────
    environment:
      HF_TOKEN: ""
      TOEIC_PHONEME_ANALYSIS_ENABLED: "true"
      # Ép các biến môi trường runtime đồng bộ với Dockerfile để chỉ định hướng lưu cache
      HF_HOME: "/root/.cache/huggingface"
      TORCH_HOME: "/root/.cache/torch"
      XDG_CACHE_HOME: "/root/.cache"
      # TTS Piper: trỏ tới voice trong ./voices (mount ở trên). Đặt TTS_VOICE_US/GB trong
      # .env để đổi tên file; rỗng → dùng mặc định dưới đây. Cache WAV persist vào volume.
      TTS_VOICE_US: "${TTS_VOICE_US:-/app/voices/en_US-lessac-medium.onnx}"
      TTS_VOICE_GB: "${TTS_VOICE_GB:-/app/voices/en_GB-alan-medium.onnx}"
      TTS_CACHE_DIR: "/root/.cache/tts"
      # Lịch sử chấm bài: DB + audio đặt trong subtree ./data/history (bind mount
      # ở volumes) để sống qua docker compose down/up --build.
      TOEIC_HISTORY_DB_PATH: "data/history/history.db"
      TOEIC_HISTORY_AUDIO_DIR: "data/history/audio"
      # Tài khoản đăng nhập + từ đã lưu: cũng đặt trong subtree đã mount để tài
      # khoản/từ vựng KHÔNG mất khi rebuild (mặc định data/*.db nằm trong image,
      # không được persist). Xem src/auth.py, src/words.py.
      TOEIC_AUTH_DB_PATH: "data/history/auth.db"
      TOEIC_WORDS_DB_PATH: "data/history/words.db"
      # NVIDIA_VISIBLE_DEVICES: "1" # Mở ra nếu muốn ép container chỉ nhìn thấy GPU số 2

    # Healthcheck dùng endpoint /health có sẵn của app.
    # healthcheck:
    #   test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 40s
    
    # restart: unless-stopped   # Bật lại khi DEPLOY thật. Lúc DEV để comment.

    # ── PHÂN BỔ TÀI NGUYÊN GPU 1 KHÔNG TRANH CHẤP LUỒNG LLM ──────────────────
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              # device_ids: ['1']       # CHỈ định tuyến duy nhất GPU 1 vào container này
              capabilities: [gpu]

volumes:
  whisper-cache: