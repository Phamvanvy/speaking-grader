# Chạy thử local: `docker compose up --build`
# Đọc biến môi trường từ file .env (HF_TOKEN, TOEIC_MODEL, WHISPER_*...).
services:
  grader:
    build: .
    # init: tini làm PID 1, nhận & chuyển SIGTERM xuống uvicorn/worker khi Ctrl+C
    # → container dừng nhanh & sạch, không bị kill cứng (exit 137) sau 10s chờ.
    init: true
    ports:
      - "8000:8000"
    env_file:
      - .env
    # Cache model NGAY TRONG PROJECT (bind mount ./.model_cache → /root/.cache):
    # gom CẢ HuggingFace (faster-whisper, wav2vec) LẪN torch hub (alignment model
    # của whisperx) để không tải lại bất cứ phần nào qua mỗi lần chạy. Thư mục
    # ./.model_cache đã được .gitignore. (Trước đây chỉ mount /huggingface nên
    # phần /root/.cache/torch của whisperx vẫn bị tải lại.)
    volumes:
      - ./.model_cache:/root/.cache
    # Cho phép container gọi service trên host (llama.cpp) qua host.docker.internal.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    
    # ── ĐỒNG BỘ MÔI TRƯỜNG & TOKEN TẢI TỐC ĐỘ CAO ─────────────────────────────
    # Đã xóa các dòng ép về faster_whisper để kích hoạt lại luồng Fast/Review từ file .env.
    # Dùng cú pháp Dictionary để Docker nạp biến chuỗi chính xác tuyệt đối.
    environment:
      # NVIDIA_VISIBLE_DEVICES: "1"       # Ép container chỉ nhìn thấy chiếc card đồ họa số 2
      HF_TOKEN: ""           # Đồng bộ Token từ file .env để triệt tiêu lỗi Warning HuggingFace
      TOEIC_PHONEME_ANALYSIS_ENABLED: "true"

    # Healthcheck dùng endpoint /health có sẵn của app.
    # healthcheck:
    #   test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 40s
    # restart: unless-stopped   # Bật lại khi DEPLOY thật. Lúc DEV để comment:
    #   nếu không, sau khi Ctrl+C container tự sống lại ở nền, giữ port 8000
    #   → lần `up` sau báo "port is already allocated", buộc phải `down` trước.

    # ── PHÂN BỔ TÀI NGUYÊN GPU 1 KHÔNG TRANH CHẤP LUỒNG LLM ──────────────────
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              # device_ids: ['1']         # CHỈ định tuyến duy nhất GPU 1 vào container này
              capabilities: [gpu]
