version: '3.8'

services:
  grader:
    build: .
    # init: tini làm PID 1, nhận & chuyển SIGTERM xuống uvicorn/worker khi Ctrl+C
    # → container dừng nhanh & sạch, không bị kill cứng (exit 137) sau 10s chờ.
    init: true
    ports:
      - "8000:8000"
    env_file:
      - .env
    
    # Cache model NGAY TRONG PROJECT (bind mount ./.model_cache → /root/.cache):
    # Gom cả HuggingFace lẫn torch hub để không tải lại bất cứ phần nào qua mỗi lần chạy.
    # Thư mục ./.model_cache cần được thêm vào .gitignore.
    volumes:
      - whisper-cache:/root/.cache

    # Cho phép container gọi service trên host (llama.cpp) qua host.docker.internal.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    
    # ── ĐỒNG BỘ MÔI TRƯỜNG & TOKEN TẢI TỐC ĐỘ CAO ─────────────────────────────
    environment:
      HF_TOKEN: ""
      TOEIC_PHONEME_ANALYSIS_ENABLED: "true"
      # Ép các biến môi trường runtime đồng bộ với Dockerfile để chỉ định hướng lưu cache
      HF_HOME: "/root/.cache/huggingface"
      TORCH_HOME: "/root/.cache/torch"
      XDG_CACHE_HOME: "/root/.cache"
      # NVIDIA_VISIBLE_DEVICES: "1" # Mở ra nếu muốn ép container chỉ nhìn thấy GPU số 2

    # Healthcheck dùng endpoint /health có sẵn của app.
    # healthcheck:
    #   test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 40s
    
    # restart: unless-stopped   # Bật lại khi DEPLOY thật. Lúc DEV để comment.

    # ── PHÂN BỔ TÀI NGUYÊN GPU 1 KHÔNG TRANH CHẤP LUỒNG LLM ──────────────────
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              # device_ids: ['1']       # CHỈ định tuyến duy nhất GPU 1 vào container này
              capabilities: [gpu]

volumes:
  whisper-cache: